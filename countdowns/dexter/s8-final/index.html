<!-- archived on pokusin.com; original analytics/social widgets removed; countdown re-pointed to run live -->

<p class="seo">
  An awesome countdown for each of the final episodes of Dexter, a TV Show on HBO. Created by Artur Pokusin.
</p>
  <section>
    <div id="countdown"  class="countdown">
      <div class="counter days">
        <div class="amount">
          {dn}
        </div>
        <div class="label">
          {dl}
        </div>
      </div>
      <div class="counter hours">
        <div class="amount">
          {hn}
        </div>
        <div class="label">
          {hl}
        </div>
      </div>
      <div class="counter minutes">
        <div class="amount">
          {mn}
        </div>
        <div class="label">
          {ml}
        </div>
      </div>
      <div class="counter seconds">
        <div class="amount">
          {sn}
        </div>
        <div class="label">
          {sl}
        </div>
      </div>
    </div>
  </section>

<footer>
  <div class="link pokusin">
