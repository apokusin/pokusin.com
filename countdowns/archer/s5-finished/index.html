      function checkPam(periods) {
        seconds = periods[6];
        pam = $("span.countdown_section:nth-child(4)");

        if (seconds <= 1 || seconds >= 55) {
          pam.addClass('animatepam');
        } else {
          pam.removeClass("animatepam");
        }
      };

  <!-- Theme song initiate -->
  <script type="text/javascript">

  var audio = $('audio').get(0),
      _paused = $('svg[role="paused"]'),
      _playing = $('svg[role="playing"]');

  audio.src = Modernizr.audio.ogg ?
    'assets/Theme.ogg' :
    'assets/Theme.mp3';

  _paused.click(function() {
    $(this).css('display', 'none');
    _playing.css('display', 'block');
    audio.play();
  });

  _playing.click(function() {
    $(this).css('display', 'none');
    _paused.css('display', 'block');
    audio.pause();
  });

  // Set to start
  $("audio").bind('ended', function(){
      _playing.css('display', 'none');
      _paused.css('display', 'block');
      this.currentTime = 0;
  });
  </script>
